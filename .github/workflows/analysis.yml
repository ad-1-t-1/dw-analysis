name: weekly-analysis

# Runs the full pipeline whenever new measurement data lands in data/raw/
# (or the analysis code changes), then commits refreshed results back to the
# repo so the supervisor always sees current numbers in results/SUMMARY.md.

on:
  push:
    paths:
      - "data/raw/**"
      - "data/legacy/**"
      - "src/**"
      - "run_analysis.py"
      - "requirements.txt"
      - ".github/workflows/analysis.yml"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: analysis-${{ github.ref }}
  cancel-in-progress: false

jobs:
  analyse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run tests first (never publish results from broken code)
        run: pytest -q
      - name: Run analysis pipeline (log captured into repo)
        id: pipeline
        continue-on-error: true
        run: |
          set -o pipefail
          python run_analysis.py --raw data/raw --out results 2>&1 | tee results/ci_log.txt
      - name: Commit results + log (even when the pipeline failed)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto: refresh analysis results (pipeline ${{ steps.pipeline.outcome }}) [skip ci]"
          file_pattern: "results/**"
      - name: Surface pipeline failure
        if: steps.pipeline.outcome == 'failure'
        run: exit 1
